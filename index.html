<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sentinel Invest — Seu Assessor IA Pessoal</title>
  <meta name="description" content="Conheça o AILo — seu assessor de investimentos pessoal com IA. Analisa sua carteira real e envia alertas personalizados direto no Telegram, 24/7." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    /* ── Reset & Base ─────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --orange:        #F97316;
      --orange-light:  #FB923C;
      --orange-dark:   #EA6C0A;
      --orange-glow:   rgba(249, 115, 22, 0.25);
      --orange-subtle: rgba(249, 115, 22, 0.08);
      --bg:            #0A0A0B;
      --bg-card:       #111113;
      --bg-elevated:   #18181B;
      --border:        rgba(255, 255, 255, 0.07);
      --border-orange: rgba(249, 115, 22, 0.3);
      --text:          #FAFAFA;
      --text-muted:    #A1A1AA;
      --text-faint:    #52525B;
      --green:         #34D399;
      --red-muted:     rgba(239, 68, 68, 0.5);
      --radius-sm:     8px;
      --radius:        14px;
      --radius-lg:     22px;
      --transition:    0.2s ease;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background-color: var(--bg);
      color: var(--text);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    a { color: inherit; text-decoration: none; }
    img { display: block; max-width: 100%; }

    /* ── Noise overlay ────────────────────────────────────────────── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
      opacity: 0.4;
    }

    /* ── Utilities ────────────────────────────────────────────────── */
    .container {
      max-width: 1120px;
      margin-inline: auto;
      padding-inline: 24px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--orange-subtle);
      border: 1px solid var(--border-orange);
      color: var(--orange-light);
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 5px 14px;
      border-radius: 999px;
    }

    .badge-dot {
      width: 6px; height: 6px;
      background: var(--orange);
      border-radius: 50%;
      animation: pulse-dot 2s infinite;
    }

    @keyframes pulse-dot {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.5; transform: scale(1.4); }
    }

    .section-label { text-align: center; margin-bottom: 16px; }

    .section-title {
      font-size: clamp(28px, 4vw, 44px);
      font-weight: 800;
      line-height: 1.15;
      letter-spacing: -0.03em;
      text-align: center;
    }

    .section-subtitle {
      font-size: 17px;
      color: var(--text-muted);
      text-align: center;
      max-width: 580px;
      margin-inline: auto;
      margin-top: 14px;
      line-height: 1.7;
    }

    .section-divider {
      width: 48px; height: 3px;
      background: var(--orange);
      border-radius: 99px;
      margin: 16px auto 0;
    }

    .highlight { color: var(--orange); }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--orange);
      color: #fff;
      font-weight: 700;
      font-size: 15px;
      padding: 14px 28px;
      border-radius: var(--radius-sm);
      border: none;
      cursor: pointer;
      transition: background var(--transition), box-shadow var(--transition), transform var(--transition);
      white-space: nowrap;
    }

    .btn-primary:hover {
      background: var(--orange-dark);
      box-shadow: 0 0 28px var(--orange-glow);
      transform: translateY(-1px);
    }

    .btn-secondary {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: transparent;
      color: var(--text);
      font-weight: 600;
      font-size: 15px;
      padding: 13px 26px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      cursor: pointer;
      transition: border-color var(--transition), background var(--transition);
    }

    .btn-secondary:hover {
      border-color: var(--orange);
      background: var(--orange-subtle);
    }

    section { padding: 96px 0; position: relative; }

    /* ── NAV ──────────────────────────────────────────────────────── */
    .nav {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(10, 10, 11, 0.88);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border-bottom: 1px solid var(--border);
    }

    .nav-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 64px;
      gap: 16px;
    }

    .nav-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 800;
      font-size: 18px;
      letter-spacing: -0.03em;
      flex-shrink: 0;
    }

    .nav-logo-icon {
      width: 32px; height: 32px;
      background: var(--orange);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 32px;
      list-style: none;
    }

    .nav-links a {
      font-size: 14px;
      font-weight: 500;
      color: var(--text-muted);
      transition: color var(--transition);
    }

    .nav-links a:hover { color: var(--text); }

    .nav-right {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }

    @media (max-width: 768px) { .nav-links { display: none; } }

    /* ── Lang Selector ────────────────────────────────────────────── */
    .lang-selector { position: relative; }

    .lang-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 7px 11px;
      cursor: pointer;
      transition: border-color var(--transition), color var(--transition);
      color: var(--text-muted);
      font-size: 13px;
      font-weight: 600;
      font-family: inherit;
    }

    .lang-btn:hover,
    .lang-btn[aria-expanded="true"] { border-color: var(--border-orange); color: var(--text); }

    .lang-flag { font-size: 15px; line-height: 1; }
    .lang-code { letter-spacing: 0.04em; }

    .lang-chevron {
      font-size: 10px;
      transition: transform var(--transition);
      opacity: 0.6;
    }

    .lang-btn[aria-expanded="true"] .lang-chevron { transform: rotate(180deg); opacity: 1; }

    .lang-dropdown {
      position: absolute;
      top: calc(100% + 8px);
      right: 0;
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      overflow: hidden;
      min-width: 148px;
      box-shadow: 0 16px 40px rgba(0,0,0,0.5);
      opacity: 0;
      transform: translateY(-6px) scale(0.97);
      pointer-events: none;
      transition: opacity 0.15s ease, transform 0.15s ease;
      z-index: 200;
    }

    .lang-dropdown.open {
      opacity: 1;
      transform: translateY(0) scale(1);
      pointer-events: auto;
    }

    .lang-option {
      display: flex;
      align-items: center;
      gap: 10px;
      width: 100%;
      padding: 10px 14px;
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 14px;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      transition: background var(--transition), color var(--transition);
    }

    .lang-option:hover { background: var(--orange-subtle); color: var(--text); }
    .lang-option.active { color: var(--orange-light); background: var(--orange-subtle); }
    .lang-option-sep { height: 1px; background: var(--border); }

    /* ── HERO ─────────────────────────────────────────────────────── */
    .hero {
      position: relative;
      padding: 110px 0 96px;
      overflow: hidden;
    }

    .hero-glow {
      position: absolute;
      top: -200px; left: 50%;
      transform: translateX(-50%);
      width: 900px; height: 600px;
      background: radial-gradient(ellipse at center, rgba(249,115,22,0.14) 0%, transparent 70%);
      pointer-events: none;
    }

    .hero-content {
      position: relative;
      z-index: 1;
      text-align: center;
      max-width: 800px;
      margin-inline: auto;
    }

    .hero-title {
      font-size: clamp(36px, 5.5vw, 68px);
      font-weight: 900;
      line-height: 1.06;
      letter-spacing: -0.04em;
      margin: 20px 0 24px;
    }

    .hero-subtitle {
      font-size: clamp(16px, 2vw, 19px);
      color: var(--text-muted);
      max-width: 580px;
      margin-inline: auto;
      margin-bottom: 40px;
      line-height: 1.7;
    }

    .hero-actions {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      flex-wrap: wrap;
    }

    .hero-trust {
      margin-top: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 28px;
      flex-wrap: wrap;
    }

    .trust-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: var(--text-muted);
    }

    .trust-icon { color: var(--orange); font-size: 14px; }

    /* ── Telegram mockup ──────────────────────────────────────────── */
    .tg-wrapper {
      margin-top: 72px;
      max-width: 560px;
      margin-inline: auto;
      position: relative;
    }

    .tg-wrapper::before {
      content: '';
      position: absolute;
      inset: -40px;
      background: radial-gradient(ellipse, rgba(249,115,22,0.08) 0%, transparent 70%);
      pointer-events: none;
    }

    .tg-window {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      overflow: hidden;
      box-shadow: 0 40px 80px -16px rgba(0,0,0,0.7), 0 0 0 1px var(--border);
      position: relative;
    }

    .tg-header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 18px;
      background: var(--bg-elevated);
      border-bottom: 1px solid var(--border);
    }

    .tg-avatar {
      width: 38px; height: 38px;
      background: var(--orange);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 17px;
      flex-shrink: 0;
    }

    .tg-bot-name {
      font-size: 14px;
      font-weight: 700;
    }

    .tg-bot-status {
      font-size: 12px;
      color: var(--green);
      margin-top: 1px;
    }

    .tg-body {
      padding: 20px 18px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .tg-msg { display: flex; flex-direction: column; }
    .tg-msg.bot  { align-items: flex-start; }
    .tg-msg.user { align-items: flex-end; }

    .tg-bubble {
      max-width: 88%;
      padding: 11px 14px;
      border-radius: 14px;
      font-size: 13.5px;
      line-height: 1.55;
    }

    .tg-bubble.bot {
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
      color: var(--text-muted);
    }

    .tg-bubble.user {
      background: var(--orange);
      color: #fff;
      border-bottom-right-radius: 4px;
      font-weight: 500;
    }

    .tg-label {
      font-size: 12px;
      font-weight: 700;
      color: var(--orange-light);
      margin-bottom: 5px;
      letter-spacing: 0.01em;
    }

    .tg-time {
      font-size: 11px;
      color: var(--text-faint);
      margin-top: 4px;
      padding-inline: 4px;
    }

    .tg-typing {
      display: flex;
      gap: 4px;
      align-items: center;
      padding: 4px 2px 0;
    }

    .tg-typing span {
      width: 6px; height: 6px;
      background: var(--text-faint);
      border-radius: 50%;
      animation: typing-bounce 1.4s infinite;
    }

    .tg-typing span:nth-child(2) { animation-delay: 0.2s; }
    .tg-typing span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes typing-bounce {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.35; }
      30%            { transform: translateY(-5px); opacity: 1; }
    }

    /* ── DIFF section ─────────────────────────────────────────────── */
    .diff { background: var(--bg-card); border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); }

    .diff-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 24px;
      margin-top: 56px;
    }

    @media (max-width: 900px) { .diff-grid { grid-template-columns: 1fr; } }

    .diff-card {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 36px 30px;
      transition: border-color var(--transition), transform var(--transition);
      position: relative;
      overflow: hidden;
    }

    .diff-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; height: 2px;
      background: linear-gradient(90deg, transparent, var(--orange), transparent);
      opacity: 0;
      transition: opacity var(--transition);
    }

    .diff-card:hover { border-color: var(--border-orange); transform: translateY(-4px); }
    .diff-card:hover::before { opacity: 1; }

    .diff-icon {
      width: 48px; height: 48px;
      background: var(--orange-subtle);
      border: 1px solid var(--border-orange);
      border-radius: var(--radius-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      margin-bottom: 22px;
    }

    .diff-title { font-size: 19px; font-weight: 700; letter-spacing: -0.02em; margin-bottom: 10px; }
    .diff-desc  { font-size: 14px; color: var(--text-muted); line-height: 1.65; }

    /* ── HOW IT WORKS ─────────────────────────────────────────────── */
    .steps {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0;
      margin-top: 60px;
      position: relative;
    }

    .steps::before {
      content: '';
      position: absolute;
      top: 36px;
      left: calc(16.66% + 24px);
      right: calc(16.66% + 24px);
      height: 1px;
      background: var(--border-orange);
      pointer-events: none;
    }

    @media (max-width: 768px) {
      .steps { grid-template-columns: 1fr; }
      .steps::before { display: none; }
    }

    .step { padding: 0 32px; text-align: center; }

    .step-num {
      width: 72px; height: 72px;
      background: var(--bg);
      border: 2px solid var(--orange);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      font-weight: 900;
      color: var(--orange);
      margin: 0 auto 28px;
      position: relative;
      z-index: 1;
      letter-spacing: -0.04em;
    }

    .step-title { font-size: 18px; font-weight: 700; margin-bottom: 12px; letter-spacing: -0.02em; }
    .step-desc  { font-size: 14px; color: var(--text-muted); line-height: 1.65; }

    /* ── WHAT YOUR ADVISOR DOES ───────────────────────────────────── */
    .does { background: var(--bg-card); border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); }

    .does-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
      margin-top: 56px;
    }

    @media (max-width: 640px) { .does-grid { grid-template-columns: 1fr; } }

    .does-card {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 28px 28px;
      display: flex;
      gap: 18px;
      align-items: flex-start;
      transition: border-color var(--transition);
    }

    .does-card:hover { border-color: var(--border-orange); }

    .does-emoji {
      font-size: 26px;
      flex-shrink: 0;
      margin-top: 2px;
    }

    .does-title { font-size: 16px; font-weight: 700; margin-bottom: 6px; }
    .does-desc  { font-size: 14px; color: var(--text-muted); line-height: 1.6; }

    /* ── FOR WHOM ─────────────────────────────────────────────────── */
    .profile-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
      margin-top: 56px;
    }

    @media (max-width: 640px) { .profile-grid { grid-template-columns: 1fr; } }

    .profile-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 28px 28px 28px;
      transition: border-color var(--transition), transform var(--transition);
      position: relative;
      overflow: hidden;
    }

    .profile-card:hover { border-color: var(--border-orange); transform: translateY(-3px); }

    .profile-badge {
      display: inline-block;
      background: var(--orange-subtle);
      border: 1px solid var(--border-orange);
      color: var(--orange-light);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      padding: 3px 10px;
      border-radius: 999px;
      margin-bottom: 16px;
    }

    .profile-title { font-size: 17px; font-weight: 700; margin-bottom: 10px; letter-spacing: -0.02em; }
    .profile-desc  { font-size: 14px; color: var(--text-muted); line-height: 1.6; }

    /* ── NOT SECTION ──────────────────────────────────────────────── */
    .not-section { background: var(--bg-card); border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); }

    .not-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      margin-top: 56px;
    }

    @media (max-width: 900px) { .not-grid { grid-template-columns: 1fr; } }

    .not-card {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 32px 28px;
    }

    .not-x {
      width: 40px; height: 40px;
      background: rgba(239,68,68,0.08);
      border: 1px solid rgba(239,68,68,0.2);
      border-radius: var(--radius-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      color: #F87171;
      font-weight: 700;
      margin-bottom: 20px;
    }

    .not-title { font-size: 17px; font-weight: 700; margin-bottom: 10px; }
    .not-desc  { font-size: 14px; color: var(--text-muted); line-height: 1.65; }

    /* ── TESTIMONIALS ─────────────────────────────────────────────── */
    .testimonials-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 24px;
      margin-top: 56px;
    }

    @media (max-width: 900px) { .testimonials-grid { grid-template-columns: 1fr; } }

    .testimonial-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 32px;
      transition: border-color var(--transition);
    }

    .testimonial-card:hover { border-color: var(--border-orange); }

    .stars { display: flex; gap: 3px; margin-bottom: 18px; }
    .star  { color: var(--orange); font-size: 14px; }

    .testimonial-text {
      font-size: 15px;
      color: var(--text-muted);
      line-height: 1.7;
      margin-bottom: 24px;
      font-style: italic;
    }

    .testimonial-text::before { content: '"'; }
    .testimonial-text::after  { content: '"'; }

    .testimonial-author { display: flex; align-items: center; gap: 12px; }

    .author-avatar {
      width: 40px; height: 40px;
      border-radius: 50%;
      background: var(--bg-elevated);
      border: 2px solid var(--border-orange);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      font-weight: 700;
      color: var(--orange);
    }

    .author-name { font-size: 14px; font-weight: 600; }
    .author-role { font-size: 12px; color: var(--text-faint); margin-top: 2px; }

    /* ── PRICING ──────────────────────────────────────────────────── */
    .pricing-wrapper { max-width: 520px; margin: 56px auto 0; }

    .pricing-card {
      background: var(--bg-card);
      border: 1px solid var(--border-orange);
      border-radius: var(--radius-lg);
      padding: 48px 48px 40px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    @media (max-width: 480px) { .pricing-card { padding: 36px 24px 32px; } }

    .pricing-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; height: 3px;
      background: linear-gradient(90deg, var(--orange-dark), var(--orange), var(--orange-light));
    }

    .pricing-glow {
      position: absolute;
      top: -80px; left: 50%;
      transform: translateX(-50%);
      width: 400px; height: 300px;
      background: radial-gradient(ellipse, rgba(249,115,22,0.1) 0%, transparent 70%);
      pointer-events: none;
    }

    .pricing-badge {
      display: inline-block;
      background: var(--orange);
      color: #fff;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      padding: 4px 14px;
      border-radius: 999px;
      margin-bottom: 24px;
    }

    .price {
      display: flex;
      align-items: baseline;
      justify-content: center;
      gap: 4px;
      margin: 8px 0 0;

    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.82);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      z-index: 500;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.22s ease;
    }

    .modal-overlay.open {
      opacity: 1;
      pointer-events: auto;
    }

      background: var(--bg-card);
      border: 1px solid var(--border-orange);
      border-radius: var(--radius-lg);

      max-width: 520px;
      max-height: 92vh;

      position: relative;
      transform: translateY(18px) scale(0.97);
      transition: transform 0.25s ease;
      scrollbar-width: thin;
      scrollbar-color: var(--border-orange) transparent;

    .modal::-webkit-scrollbar-thumb { background: var(--border-orange); border-radius: 99px; }

      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; height: 3px;
      background: linear-gradient(90deg, var(--orange-dark), var(--orange), var(--orange-light));

      background: var(--bg-card);
      z-index: 1;

      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: var(--text-muted);
      font-size: 14px;
      transition: border-color var(--transition), color var(--transition);
      flex-shrink: 0;
      font-family: inherit;

      margin-top: 5px;
      display: none;

    /* Checkboxes */
    .checkbox-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;

    @media (max-width: 400px) { .checkbox-grid { grid-template-columns: repeat(2, 1fr); } }

    .checkbox-item {

      background: rgba(239,68,68,0.08);

      cursor: not-allowed;
      pointer-events: none;

      transform: translateY(24px);
      transition: opacity 0.6s ease, transform 0.6s ease;
    }

    /* ── Language detection ───────────────────────────────────────── */
    function detectLang() {
      const saved = localStorage.getItem('sentinel-lang');
      if (saved && T[saved]) return saved;
      const b = (navigator.language || 'en').toLowerCase();
      if (b.startsWith('pt')) return 'pt';
      if (b.startsWith('es')) return 'es';
      return 'en';
    }

    /* ── Apply translations ───────────────────────────────────────── */
    function applyLang(lang) {
      const d = T[lang];

      document.documentElement.lang = d['html.lang'];
      document.title = d['meta.title'];
      const md = document.querySelector('meta[name="description"]');
      if (md) md.setAttribute('content', d['meta.description']);

      document.querySelectorAll('[data-i18n]').forEach(el => {
        const v = d[el.dataset.i18n];
        if (v !== undefined) el.textContent = v;
      });

      document.querySelectorAll('[data-i18n-html]').forEach(el => {
        const v = d[el.dataset.i18nHtml];
        if (v !== undefined) el.innerHTML = v;
      });

      document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
        const v = d[el.dataset.i18nPlaceholder];
        if (v !== undefined) el.setAttribute('placeholder', v);
      });

      document.getElementById('currentFlag').textContent = d['lang.flag'];
      document.getElementById('currentCode').textContent = d['lang.code'];

      document.querySelectorAll('.lang-option').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.lang === lang);
      });

      localStorage.setItem('sentinel-lang', lang);
    }

    /* ── Dropdown ─────────────────────────────────────────────────── */
    const langBtn      = document.getElementById('langBtn');
    const langDropdown = document.getElementById('langDropdown');

    const open  = () => { langDropdown.classList.add('open');    langBtn.setAttribute('aria-expanded', 'true');  };
    const close = () => { langDropdown.classList.remove('open'); langBtn.setAttribute('aria-expanded', 'false'); };

    langBtn.addEventListener('click', e => { e.stopPropagation(); langDropdown.classList.contains('open') ? close() : open(); });
    document.addEventListener('click', close);
    langDropdown.addEventListener('click', e => e.stopPropagation());
    document.addEventListener('keydown', e => { if (e.key === 'Escape') close(); });

    document.querySelectorAll('.lang-option').forEach(btn => {
      btn.addEventListener('click', () => { applyLang(btn.dataset.lang); close(); });
    });

    /* ── Scroll animations ────────────────────────────────────────── */
    const obs = new IntersectionObserver(
      entries => entries.forEach(e => {
        if (e.isIntersecting) { e.target.classList.add('visible'); obs.unobserve(e.target); }
      }),
      { threshold: 0.08 }
    );
    document.querySelectorAll('.fade-up').forEach(el => obs.observe(el));

    /* ── Modal ────────────────────────────────────────────────────── */
    const overlay    = document.getElementById('modalOverlay');
    const formView   = document.getElementById('modalFormView');
    const successDiv = document.getElementById('modalSuccess');
    const form       = document.getElementById('modalForm');

    function openModal() {
      overlay.classList.add('open');
      document.body.style.overflow = 'hidden';
      formView.style.display = '';
      successDiv.classList.remove('show');
      form.reset();
      document.querySelectorAll('.form-error').forEach(e => e.classList.remove('show'));
      document.querySelectorAll('#modalForm .form-input, #modalForm .form-select').forEach(e => e.classList.remove('is-error'));
      document.querySelectorAll('.checkbox-item').forEach(e => e.classList.remove('ticked'));
      document.getElementById('formServerError').classList.remove('show');
      const btn = document.getElementById('formSubmitBtn');
      btn.classList.remove('loading');
      const _lang = localStorage.getItem('sentinel-lang') || 'pt';
      btn.textContent = T[_lang]['form.submit'];
    }

    function closeModal() {
      overlay.classList.remove('open');
      document.body.style.overflow = '';
    }

    document.addEventListener('click', e => {
      const trigger = e.target.closest('[data-open-modal]');
      if (trigger) { e.preventDefault(); openModal(); }
    });

    document.getElementById('modalClose').addEventListener('click', closeModal);
    document.getElementById('modalSuccessBtn').addEventListener('click', closeModal);

    overlay.addEventListener('click', e => { if (e.target === overlay) closeModal(); });

    document.addEventListener('keydown', e => {
      if (e.key === 'Escape' && overlay.classList.contains('open')) closeModal();
    });

    document.querySelectorAll('.checkbox-item input[type="checkbox"]').forEach(cb => {
      cb.addEventListener('change', () => cb.closest('.checkbox-item').classList.toggle('ticked', cb.checked));
    });

    form.addEventListener('submit', e => {
      e.preventDefault();
      const lang = localStorage.getItem('sentinel-lang') || 'pt';
      const d = T[lang];
      let valid = true;

      const fields = [
        { el: document.getElementById('fName'),      err: document.getElementById('errName'),      type: 'required' },
        { el: document.getElementById('fEmail'),     err: document.getElementById('errEmail'),     type: 'email'    },
        { el: document.getElementById('fPhone'),     err: document.getElementById('errPhone'),     type: 'required' },
        { el: document.getElementById('fPortfolio'), err: document.getElementById('errPortfolio'), type: 'required' },
      ];

      const emailRx = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

      fields.forEach(({ el, err, type }) => {
        let msg = '';
        if (!el.value.trim()) {
          msg = d['form.error.required'];
        } else if (type === 'email' && !emailRx.test(el.value.trim())) {
          msg = d['form.error.email'];
        }
        if (msg) {
          el.classList.add('is-error');
          err.textContent = msg;
          err.classList.add('show');
          valid = false;
        } else {
          el.classList.remove('is-error');
          err.classList.remove('show');
        }
      });

      if (!valid) return;

      const submitBtn   = document.getElementById('formSubmitBtn');
      const serverError = document.getElementById('formServerError');

      /* reset server error */
      serverError.classList.remove('show');

      /* loading state */
      submitBtn.classList.add('loading');
      const origText = submitBtn.textContent;
      submitBtn.textContent = '…';

      const ativos = Array.from(
        document.querySelectorAll('#modalForm .checkbox-item input[type="checkbox"]:checked')
      ).map(cb => cb.value);

      const payload = {
        nome:             document.getElementById('fName').value.trim(),
        email:            document.getElementById('fEmail').value.trim(),
        whatsapp:         document.getElementById('fPhone').value.trim(),
        pais:             document.getElementById('fCountry').value,
        tamanho_carteira: document.getElementById('fPortfolio').value,
        ativos,
        como_conheceu:    document.getElementById('fSource').value,
        idioma:           (localStorage.getItem('sentinel-lang') || 'pt').toUpperCase(),
        data_hora:        new Date().toISOString(),
      };

      fetch('https://exaggerated-festinately-izola.ngrok-free.dev/webhook/sentinel-leads', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify(payload),
      })
        .then(res => {
          if (!res.ok) throw new Error('HTTP ' + res.status);
          formView.style.display = 'none';
          successDiv.classList.add('show');
        })
        .catch(() => {
          serverError.textContent = d['form.error.server'];
          serverError.classList.add('show');
          submitBtn.textContent = origText;
          submitBtn.classList.remove('loading');
        });
    });

    /* ── Init ─────────────────────────────────────────────────────── */
    applyLang(detectLang());
  })();
  </script>
